<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오소리 & 부엉이 가계부</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  :root {
    --bg:#f7f6f3; --surface:#fff; --border:#e8e5df;
    --text:#1a1917; --muted:#888780;
    --income:#1D9E75; --expense:#D85A30;
    --p1:#534AB7; --p2:#D85A30;
    --p1-bg:#EEEDFE; --p2-bg:#FAECE7;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:600;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--p1);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
  .login-box{background:var(--surface);border-radius:24px;padding:32px 24px;width:100%;max-width:360px;text-align:center;border:1px solid var(--border);}
  .login-logo{font-size:48px;margin-bottom:12px;}
  .login-title{font-size:22px;font-weight:700;margin-bottom:6px;}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
  .user-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .user-btn{padding:16px;border-radius:14px;border:2px solid var(--border);background:none;font-family:inherit;cursor:pointer;transition:all .15s;}
  .user-btn.p1{border-color:var(--p1-bg);}
  .user-btn.p2{border-color:var(--p2-bg);}
  .user-btn.selected.p1{background:var(--p1-bg);border-color:var(--p1);}
  .user-btn.selected.p2{background:var(--p2-bg);border-color:var(--p2);}
  .user-btn-emoji{font-size:32px;display:block;margin-bottom:6px;}
  .user-btn-name{font-size:14px;font-weight:700;}
  .user-btn.p1 .user-btn-name{color:var(--p1);}
  .user-btn.p2 .user-btn-name{color:var(--p2);}
  .pin-label{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:none;transition:all .15s;}
  .pin-dot.filled{background:var(--text);border-color:var(--text);}
  .pin-dot.p1.filled{background:var(--p1);border-color:var(--p1);}
  .pin-dot.p2.filled{background:var(--p2);border-color:var(--p2);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
  .pin-key{padding:16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s;}
  .pin-key:hover{background:var(--bg);}
  .pin-key:active{transform:scale(.95);}
  .pin-key.del{font-size:14px;color:var(--muted);}
  .login-error{font-size:12px;color:var(--expense);margin-top:12px;min-height:18px;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-left{display:flex;align-items:center;gap:10px;}
  .header-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-avatar.p1{background:var(--p1-bg);}
  .header-avatar.p2{background:var(--p2-bg);}
  .header-name{font-size:15px;font-weight:700;}
  .header-right{display:flex;gap:8px;align-items:center;}
  .sync-wrap{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
  .sync-dot.ok{background:var(--income);}
  .sync-dot.ing{background:#BA7517;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
  .btn-sm{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-family:inherit;color:var(--muted);cursor:pointer;}
  .btn-sm:hover{background:var(--border);}
  .btn-notif{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;}

  .period-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px 6px;}
  .period-nav button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .period-nav button:hover{background:var(--border);}
  .period-center{text-align:center;}
  .period-main{font-size:17px;font-weight:700;letter-spacing:-.3px;}
  .period-range{font-size:11px;color:var(--muted);margin-top:2px;}

  .container{max-width:480px;margin:0 auto;padding:12px 16px 100px;}

  .notif-banner{background:var(--p1-bg);border:1px solid var(--p1);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:none;align-items:center;gap:10px;}
  .notif-banner.show{display:flex;}
  .notif-banner-text{flex:1;font-size:12px;font-weight:500;color:var(--p1);}
  .notif-banner-btn{background:var(--p1);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}

  .summary-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:10px;}
  .sum-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;}
  .sum-balance{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:14px;}
  .sum-balance.pos{color:var(--income);}
  .sum-balance.neg{color:var(--expense);}
  .sum-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .sum-item{background:var(--bg);border-radius:10px;padding:11px 13px;}
  .sum-val{font-size:15px;font-weight:700;}
  .sum-val.inc{color:var(--income);}
  .sum-val.exp{color:var(--expense);}

  .person-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .pcard{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;}
  .pcard.p1{border-top:3px solid var(--p1);}
  .pcard.p2{border-top:3px solid var(--p2);}
  .pname{font-size:12px;font-weight:700;margin-bottom:9px;}
  .pcard.p1 .pname{color:var(--p1);}
  .pcard.p2 .pname{color:var(--p2);}
  .pstat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
  .pstat-l{color:var(--muted);}
  .pstat-v{font-weight:600;}

  .tabs{display:flex;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:4px;margin-bottom:10px;gap:4px;}
  .tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;border-radius:10px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);transition:all .15s;}
  .tab.active{background:var(--text);color:#fff;}

  .form-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;display:none;}
  .form-card.show{display:block;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .fgroup{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .flabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .finput{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:100%;}
  .finput:focus{border-color:var(--text);}
  .who-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .who-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
  .who-badge.p1{background:var(--p1-bg);color:var(--p1);}
  .who-badge.p2{background:var(--p2-bg);color:var(--p2);}
  .submit-btn{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
  .submit-btn:hover{opacity:.85;}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}

  .chart-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;}
  .chart-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
  .chart-wrap{position:relative;width:100%;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;color:var(--muted);}
  .leg-item{display:flex;align-items:center;gap:4px;}
  .leg-dot{width:9px;height:9px;border-radius:2px;}

  .sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
  .fbtn{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:none;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--muted);}
  .fbtn.active{background:var(--text);border-color:var(--text);color:#fff;}
  .rec-item{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:si .2s ease;}
  @keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .rec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .rec-dot.income{background:var(--income);}
  .rec-dot.expense{background:var(--expense);}
  .rec-info{flex:1;min-width:0;}
  .rec-place{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rec-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;}
  .badge.p1{background:var(--p1-bg);color:var(--p1);}
  .badge.p2{background:var(--p2-bg);color:var(--p2);}
  .tag{display:inline-block;font-size:9px;font-weight:500;padding:2px 6px;border-radius:20px;background:var(--bg);color:var(--muted);border:1px solid var(--border);}
  .rec-amt{font-size:14px;font-weight:700;flex-shrink:0;}
  .rec-amt.income{color:var(--income);}
  .rec-amt.expense{color:var(--expense);}
  .rec-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;flex-shrink:0;}
  .rec-del:hover{color:var(--expense);}
  .empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;}

  .manual-notif-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .manual-notif-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;}
  .manual-notif-row{display:flex;gap:8px;}
  .manual-notif-btn{background:var(--p1);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
  .manual-notif-btn:hover{opacity:.85;}

  /* 할일 */
  .todo-item{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:opacity .2s;}
  .todo-item.done-item{opacity:.6;}
  .todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
  .todo-check.done{background:var(--income);border-color:var(--income);color:#fff;}
  .todo-check.pending{background:none;border-color:var(--p1);}
  .todo-info{flex:1;min-width:0;}
  .todo-content{font-size:13px;font-weight:600;}
  .todo-content.done-text{text-decoration:line-through;color:var(--muted);}
  .todo-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;}
  .todo-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .todo-status.pending{background:var(--p1-bg);color:var(--p1);}
  .todo-status.done{background:#e8fef4;color:var(--income);}
  .todo-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;flex-shrink:0;}
  .todo-del:hover{color:var(--expense);}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);font-weight:500;">연결 중...</div>
</div>

<div class="login-screen" id="loginScreen" style="display:none;">
  <div class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">오소리 & 부엉이</div>
    <div class="login-sub">누구세요?</div>
    <div class="user-select">
      <button class="user-btn p1" id="selectOsori" onclick="selectUser('osori')">
        <span class="user-btn-emoji">🦡</span>
        <span class="user-btn-name">오소리</span>
      </button>
      <button class="user-btn p2" id="selectBuengi" onclick="selectUser('buengi')">
        <span class="user-btn-emoji">🦉</span>
        <span class="user-btn-name">부엉이</span>
      </button>
    </div>
    <div class="pin-label" id="pinLabel">사용자를 선택해주세요</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key" style="grid-column:2;" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="mainApp" style="display:none;">
<div class="header">
  <div class="header-left">
    <div class="header-avatar" id="headerAvatar"></div>
    <div class="header-name" id="headerName">가계부</div>
  </div>
  <div class="header-right">
    <div class="sync-wrap">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">연결 중</span>
    </div>
    <button class="btn-notif" id="notifBtn" onclick="setupNotification()" title="알림 설정">🔔</button>
    <button class="btn-sm" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="period-nav">
  <button onclick="changePeriod(-1)">‹</button>
  <div class="period-center">
    <div class="period-main" id="periodMain"></div>
    <div class="period-range" id="periodRange"></div>
  </div>
  <button onclick="changePeriod(1)">›</button>
</div>

<div class="container">
  <div class="notif-banner" id="notifBanner">
    <span class="notif-banner-text">🔔 알림 허용하면 상대방 입력시 바로 알려드려요!</span>
    <button class="notif-banner-btn" onclick="setupNotification()">허용하기</button>
  </div>

  <!-- 수동 알림 전송 버튼 -->
  <div class="manual-notif-card" id="manualNotifCard" style="display:none;">
    <div class="manual-notif-title">📣 상대방에게 알림 보내기</div>
    <div class="manual-notif-row">
      <input class="finput" id="manualNotifMsg" type="text" placeholder="메시지 입력 (예: 밥값 입력했어!)" maxlength="50">
      <button class="manual-notif-btn" onclick="sendManualNotif()">전송</button>
    </div>
  </div>

  <div class="summary-card">
    <div class="sum-label" id="sumLabel">이번 달 잔액</div>
    <div class="sum-balance pos" id="totalBalance">0 원</div>
    <div class="sum-row">
      <div class="sum-item"><div class="sum-label">총 수입</div><div class="sum-val inc" id="totalIncome">0 원</div></div>
      <div class="sum-item"><div class="sum-label">총 지출</div><div class="sum-val exp" id="totalExpense">0 원</div></div>
    </div>
    <div class="sum-row" style="margin-top:10px;">
      <div class="sum-item"><div class="sum-label">💰 투자 납입</div><div class="sum-val exp" id="totalInvest">0 원</div></div>
      <div class="sum-item"><div class="sum-label">📈 투자 회수</div><div class="sum-val inc" id="totalReturn">0 원</div></div>
    </div>
  </div>

  <div class="person-row">
    <div class="pcard p1">
      <div class="pname">🦡 오소리</div>
      <div class="pstat"><span class="pstat-l">수입</span><span class="pstat-v" id="p1income" style="color:var(--income)">0</span></div>
      <div class="pstat"><span class="pstat-l">지출</span><span class="pstat-v" id="p1expense" style="color:var(--expense)">0</span></div>
    </div>
    <div class="pcard p2">
      <div class="pname">🦉 부엉이</div>
      <div class="pstat"><span class="pstat-l">수입</span><span class="pstat-v" id="p2income" style="color:var(--income)">0</span></div>
      <div class="pstat"><span class="pstat-l">지출</span><span class="pstat-v" id="p2expense" style="color:var(--expense)">0</span></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabExpense" onclick="switchTab('expense')">지출</button>
    <button class="tab" id="tabIncome" onclick="switchTab('income')">수입</button>
    <button class="tab" id="tabChart" onclick="switchTab('chart')">차트</button>
    <button class="tab" id="tabTodo" onclick="switchTab('todo')">할일</button>
  </div>

  <div class="form-card show" id="expenseForm">
    <div class="who-label">입력자: <span class="who-badge" id="expenseWho"></span></div>
    <div class="form-row">
      <div class="fgroup" style="margin-bottom:0;">
        <label class="flabel">금액</label>
        <input class="finput" id="expenseAmount" type="number" placeholder="0" min="0">
      </div>
      <div class="fgroup" style="margin-bottom:0;">
        <label class="flabel">카테고리</label>
        <select class="finput" id="expenseCategory">
          <option value="식비">🍽 식비</option>
          <option value="카페">☕ 카페</option>
          <option value="교통">🚌 교통</option>
          <option value="쇼핑">🛍 쇼핑</option>
          <option value="마트">🛒 마트</option>
          <option value="의료">🏥 의료</option>
          <option value="문화">🎬 문화</option>
          <option value="여행">✈ 여행</option>
          <option value="통신">📱 통신</option>
          <option value="주거">🏠 주거</option>
          <option value="대출">🏦 대출</option>
          <option value="애견용품">🐾 애견용품</option>
          <option value="주식 매수">📈 주식 매수</option>
          <option value="코인 매수">🪙 코인 매수</option>
          <option value="적금/예금">💰 적금/예금</option>
          <option value="기타">📦 기타</option>
        </select>
      </div>
    </div>

var COLORS2 = ['#185FA5','#534AB7','#3B6D11','#993556','#BA7517','#0F6E56','#A32D2D','#888780'];

// ── 기간 계산 ─────────────────────────────────────
function getPeriodKey(date) {
  var d=date||new Date(), y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  if(day<20){m-=1; if(m<1){m=12;y-=1;}}
  return y+'-'+String(m).padStart(2,'0');
}
function getPeriodRange(key) {
  var parts=key.split('-'), y=parseInt(parts[0]), m=parseInt(parts[1]);
  var em=m+1, ey=y; if(em>12){em=1;ey+=1;}
  return { start:y+'-'+String(m).padStart(2,'0')+'-20', end:ey+'-'+String(em).padStart(2,'0')+'-19' };
}
function periodLabel(key) { var p=key.split('-'); return parseInt(p[0])+'년 '+parseInt(p[1])+'월분'; }
function periodRangeLabel(key) { var r=getPeriodRange(key); return r.start.slice(5).replace('-','/')+' ~ '+r.end.slice(5).replace('-','/'); }

// ── 싱크 ──────────────────────────────────────────
function syncStatus(s) {
  var dot=document.getElementById('syncDot'), txt=document.getElementById('syncText');
  dot.className='sync-dot '+(s==='ok'?'ok':s==='ing'?'ing':'');
  txt.textContent=s==='ok'?'실시간 연결':s==='ing'?'동기화 중':'연결 끊김';
}

// ── 초기화 ────────────────────────────────────────
async function init() {
  var saved = localStorage.getItem('currentUser');
  if (saved) { currentUser=JSON.parse(saved); showMain(); }
  else { document.getElementById('loading').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }
}

// ── 로그인 ────────────────────────────────────────
window.selectUser = function(userId) {
  selectedUserId=userId; pinBuffer=''; updatePinDots();
  document.getElementById('selectOsori').classList.toggle('selected', userId==='osori');
  document.getElementById('selectBuengi').classList.toggle('selected', userId==='buengi');
  document.getElementById('pinLabel').textContent=USERS[userId].emoji+' '+USERS[userId].name+' PIN 입력';
  document.getElementById('loginError').textContent='';
};
window.pinInput = async function(num) {
  if(!selectedUserId){document.getElementById('loginError').textContent='먼저 사용자를 선택해주세요';return;}
  if(pinBuffer.length>=4) return;
  pinBuffer+=num; updatePinDots();
  if(pinBuffer.length===4) await checkPin();
};
window.pinDelete = function() { if(pinBuffer.length>0){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();} };
function updatePinDots() {
  for(var i=0;i<4;i++){
    var dot=document.getElementById('dot'+i);
    dot.className='pin-dot '+(selectedUserId?USERS[selectedUserId].class:'');
    if(i<pinBuffer.length) dot.classList.add('filled');
  }
}
async function checkPin() {
  try {
    var snap=await getDoc(doc(db,'settings','pins'));
    var pins=snap.exists()?snap.data():{};
    if(!pins[selectedUserId]){
      await setDoc(doc(db,'settings','pins'),Object.assign(pins,{[selectedUserId]:pinBuffer}),{merge:true});
      loginSuccess(); return;
    }
    if(pins[selectedUserId]===pinBuffer){ loginSuccess(); }
    else { document.getElementById('loginError').textContent='❌ PIN이 틀렸어요!'; pinBuffer=''; updatePinDots(); }
  } catch(e) { document.getElementById('loginError').textContent='연결 오류. 다시 시도해주세요.'; pinBuffer=''; updatePinDots(); }
}
function loginSuccess() {
  currentUser=Object.assign({},USERS[selectedUserId],{id:selectedUserId});
  localStorage.setItem('currentUser',JSON.stringify(currentUser));
  document.getElementById('loginScreen').style.display='none';
  showMain();
}
window.logout = function() {
  localStorage.removeItem('currentUser'); currentUser=null;
  if(unsub) unsub();
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  pinBuffer=''; selectedUserId=null;
  document.getElementById('selectOsori').classList.remove('selected');
  document.getElementById('selectBuengi').classList.remove('selected');
  document.getElementById('pinLabel').textContent='사용자를 선택해주세요';
  updatePinDots();
};

function showMain() {
  document.getElementById('loading').style.display='none';
  document.getElementById('mainApp').style.display='block';
  var av=document.getElementById('headerAvatar');
  av.textContent=currentUser.emoji; av.className='header-avatar '+currentUser.class;
  document.getElementById('headerName').textContent=currentUser.name+'으로 로그인';
  document.getElementById('expenseWho').textContent=currentUser.emoji+' '+currentUser.name;
  document.getElementById('expenseWho').className='who-badge '+currentUser.class;
  document.getElementById('incomeWho').textContent=currentUser.emoji+' '+currentUser.name;
  document.getElementById('incomeWho').className='who-badge '+currentUser.class;
  document.getElementById('todoWho').textContent=currentUser.emoji+' '+currentUser.name;
  document.getElementById('todoWho').className='who-badge '+currentUser.class;
  renderPeriod(); subscribe(); bindKeys();
  checkNotifStatus();
}

// ── FCM 알림 ──────────────────────────────────────
function checkNotifStatus() {
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') {
    document.getElementById('notifBanner').classList.add('show');
  } else if(Notification.permission==='granted') {
    document.getElementById('notifBtn').textContent='🔔';
    document.getElementById('notifBanner').classList.remove('show');
    document.getElementById('manualNotifCard').style.display='block';
    saveFcmToken();
  } else {
    document.getElementById('notifBtn').textContent='🔕';
  }
}

window.setupNotification = async function() {
  if(!('Notification' in window)){toast('이 브라우저는 알림을 지원하지 않아요');return;}
  try {
    var perm = await Notification.requestPermission();
    document.getElementById('notifBanner').classList.remove('show');
    if(perm==='granted'){
      document.getElementById('notifBtn').textContent='🔔';
      document.getElementById('manualNotifCard').style.display='block';
      toast('알림 허용됐어요! 🔔');
      await saveFcmToken();
    } else {
      document.getElementById('notifBtn').textContent='🔕';
      toast('알림이 거부됐어요');
    }
  } catch(e) { toast('알림 설정 실패'); }
};

// ── 수동 알림 전송 ────────────────────────────────
window.sendManualNotif = async function() {
  var msg = document.getElementById('manualNotifMsg').value.trim();
  if(!msg){toast('메시지를 입력해주세요');return;}
  if(!currentUser){toast('로그인이 필요해요');return;}

  var otherUser = currentUser.id==='osori'?'buengi':'osori';
  var myName = currentUser.name;

  try {
    await addDoc(collection(db,'notifications'),{
      from: currentUser.id,
      to: otherUser,
      message: msg,
      senderName: myName,
      createdAt: Date.now()
    });
    document.getElementById('manualNotifMsg').value='';
    toast('알림 전송됨 📣');
  } catch(e){ toast('전송 실패'); }
};

async function saveFcmToken() {
  if(!messaging || !currentUser) return;
  try {
    var token = await getToken(messaging, { vapidKey: VAPID_KEY });
    if(token) {
      await setDoc(doc(db,'fcmTokens',currentUser.id), {
        token: token, userId: currentUser.id, updatedAt: Date.now()
      });
      console.log('FCM 토큰 저장 완료');
    }
  } catch(e) { console.log('FCM 토큰 저장 실패:', e); }
}

function setupForegroundMessage() {
  if(!messaging) return;
  onMessage(messaging, function(payload) {
    var title = payload.notification?.title || '오소리 & 부엉이';
    var body = payload.notification?.body || '새 내역이 추가됐어요!';
    toast(title + ': ' + body);
    // 포그라운드에서도 시스템 알림 표시
    if(Notification.permission==='granted') {
      new Notification(title, { body: body });
    }
  });
}

// ── 구독 ──────────────────────────────────────────
function subscribe() {
  if(unsub) unsub();
  syncStatus('ing');
  var q=query(collection(db,'records'),where('period','==',currentKey),orderBy('createdAt','desc'));
  var isFirst=true;
  unsub=onSnapshot(q, function(snap){
    var newRecords=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(!isFirst && currentUser){
      snap.docChanges().forEach(function(change){
        if(change.type==='added'){
          var r=change.doc.data();
          if(r.addedBy && r.addedBy!==currentUser.id){
            var who=USERS[r.addedBy]?USERS[r.addedBy].name:'상대방';
            var sign=r.type==='expense'?'-':'+';
            // 포그라운드 알림
            if(Notification.permission==='granted'){
              new Notification(who+'이 입력했어요! 💰', {
                body: sign+fmt(r.amount)+'원 · '+r.category+(r.memo?' · '+r.memo:''),
                icon: '/odols/icon.png'
              });
            }
            toast(who+': '+sign+fmt(r.amount)+'원 입력됨');
          }
        }
      });
    }
    isFirst=false;
    records=newRecords; syncStatus('ok'); renderAll();
  }, function(err){ syncStatus(''); toast('오류: '+(err.code||err.message)); });
}

// ── 기간 네비 ─────────────────────────────────────
function renderPeriod() {
  document.getElementById('periodMain').textContent=periodLabel(currentKey);
  document.getElementById('periodRange').textContent=periodRangeLabel(currentKey);
  document.getElementById('sumLabel').textContent=periodLabel(currentKey)+' 잔액';
}
window.changePeriod = function(dir) {
  var parts=currentKey.split('-');
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1+dir,1);
  currentKey=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderPeriod(); subscribe();
};

// ── 렌더 ──────────────────────────────────────────
function renderAll() { renderSummary(); renderRecords(); if(document.getElementById('chartSection').style.display!=='none') renderCharts(); }

function renderSummary() {
  var inc=0,exp=0,p1i=0,p1e=0,p2i=0,p2e=0,invest=0,ret=0;
  var iCats=['주식 매수','코인 매수','적금/예금'], rCats=['주식 매도','코인 매도','배당/이자'];
  records.forEach(function(r){
    if(r.type==='income'){inc+=r.amount;if(r.person===1)p1i+=r.amount;else p2i+=r.amount;if(rCats.indexOf(r.category)>=0)ret+=r.amount;}
    else{exp+=r.amount;if(r.person===1)p1e+=r.amount;else p2e+=r.amount;if(iCats.indexOf(r.category)>=0)invest+=r.amount;}
  });
  var bal=inc-exp, el=document.getElementById('totalBalance');
  el.textContent=fmt(bal)+' 원'; el.className='sum-balance '+(bal>=0?'pos':'neg');
  document.getElementById('totalIncome').textContent=fmt(inc)+' 원';
  document.getElementById('totalExpense').textContent=fmt(exp)+' 원';
  document.getElementById('totalInvest').textContent=fmt(invest)+' 원';
  document.getElementById('totalReturn').textContent=fmt(ret)+' 원';
  document.getElementById('p1income').textContent=fmt(p1i)+' 원';
  document.getElementById('p1expense').textContent=fmt(p1e)+' 원';
  document.getElementById('p2income').textContent=fmt(p2i)+' 원';
  document.getElementById('p2expense').textContent=fmt(p2e)+' 원';
}

function filteredRecords() {
  if(currentFilter==='all') return records;
  if(currentFilter==='p1') return records.filter(function(r){return r.person===1;});
  if(currentFilter==='p2') return records.filter(function(r){return r.person===2;});
  if(currentFilter==='income') return records.filter(function(r){return r.type==='income';});
  return records.filter(function(r){return r.type==='expense';});
}

function renderRecords() {
  var fr=filteredRecords(), list=document.getElementById('recordList');
  if(!fr.length){list.innerHTML='<div class="empty">이번 기간 내역이 없어요</div>';return;}
  list.innerHTML=fr.map(function(r){
    var sign=r.type==='income'?'+':'-', pClass='p'+r.person;
    var pEmoji=r.person===1?'🦡':'🦉', pName=r.person===1?'오소리':'부엉이';
    var date=r.date?r.date.slice(5).replace('-','/'):'';
    return '<div class="rec-item"><div class="rec-dot '+r.type+'"></div>'+
      '<div class="rec-info"><div class="rec-place">'+esc(r.memo||r.category)+'</div>'+
      '<div class="rec-meta"><span class="badge '+pClass+'">'+pEmoji+' '+esc(pName)+'</span>'+
      '<span class="tag">'+esc(r.category)+'</span>'+(r.payment?'<span class="tag">'+esc(r.payment)+'</span>':'')+
      (date?'<span>'+date+'</span>':'')+
      '</div></div><div class="rec-amt '+r.type+'">'+sign+fmt(r.amount)+'원</div>'+
      '<button class="rec-del" onclick="delRecord(\''+r.id+'\')">×</button></div>';
  }).join('');
}

function renderCharts() {
  var expenses=records.filter(function(r){return r.type==='expense';});
  var catMap={};expenses.forEach(function(r){catMap[r.category]=(catMap[r.category]||0)+r.amount;});
  var cL=Object.keys(catMap),cD=cL.map(function(k){return catMap[k];});
  if(catChart) catChart.destroy();
  if(cL.length){
    catChart=new Chart(document.getElementById('catChart').getContext('2d'),{type:'doughnut',data:{labels:cL,datasets:[{data:cD,backgroundColor:COLORS.slice(0,cL.length),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+fmt(c.raw)+'원';}}}}}});
    document.getElementById('catLegend').innerHTML=cL.map(function(l,i){var p=Math.round(cD[i]/cD.reduce(function(a,b){return a+b;},0)*100);return '<div class="leg-item"><div class="leg-dot" style="background:'+COLORS[i]+'"></div>'+esc(l)+' '+p+'%</div>';}).join('');
  } else { document.getElementById('catLegend').innerHTML=''; }

  var payMap={};expenses.forEach(function(r){var k=r.payment||'미분류';payMap[k]=(payMap[k]||0)+r.amount;});
  var pL=Object.keys(payMap),pD=pL.map(function(k){return payMap[k];});
  if(payChart) payChart.destroy();
  if(pL.length){
    payChart=new Chart(document.getElementById('paymentChart').getContext('2d'),{type:'doughnut',data:{labels:pL,datasets:[{data:pD,backgroundColor:COLORS2.slice(0,pL.length),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+fmt(c.raw)+'원';}}}}}});
    document.getElementById('paymentLegend').innerHTML=pL.map(function(l,i){var p=Math.round(pD[i]/pD.reduce(function(a,b){return a+b;},0)*100);return '<div class="leg-item"><div class="leg-dot" style="background:'+COLORS2[i]+'"></div>'+esc(l)+' '+p+'%</div>';}).join('');
  } else { document.getElementById('paymentLegend').innerHTML=''; }

  var p1e=0,p2e=0;expenses.forEach(function(r){if(r.person===1)p1e+=r.amount;else p2e+=r.amount;});
  if(personChart) personChart.destroy();
  personChart=new Chart(document.getElementById('personChart').getContext('2d'),{type:'bar',data:{labels:['🦡 오소리','🦉 부엉이'],datasets:[{data:[p1e,p2e],backgroundColor:['#534AB7','#D85A30'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+fmt(c.raw)+'원';}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return fmt(v);},font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false},ticks:{font:{size:12}}}}}});

  var incT=records.filter(function(r){return r.type==='income';}).reduce(function(a,r){return a+r.amount;},0);
  var expT=expenses.reduce(function(a,r){return a+r.amount;},0);
  if(sumChart) sumChart.destroy();
  sumChart=new Chart(document.getElementById('summaryChart').getContext('2d'),{type:'bar',data:{labels:['수입','지출'],datasets:[{data:[incT,expT],backgroundColor:['#1D9E75','#D85A30'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+fmt(c.raw)+'원';}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return fmt(v);},font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false},ticks:{font:{size:12}}}}}});
}

window.switchTab=function(tab){
  ['expenseForm','incomeForm'].forEach(function(id){document.getElementById(id).classList.remove('show');});
  document.getElementById('chartSection').style.display='none';
  document.getElementById('recordsSection').style.display='none';
  document.getElementById('todoSection').style.display='none';
  ['tabExpense','tabIncome','tabChart','tabTodo'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  if(tab==='expense'){document.getElementById('expenseForm').classList.add('show');document.getElementById('recordsSection').style.display='';document.getElementById('tabExpense').classList.add('active');}
  else if(tab==='income'){document.getElementById('incomeForm').classList.add('show');document.getElementById('recordsSection').style.display='';document.getElementById('tabIncome').classList.add('active');}
  else if(tab==='chart'){document.getElementById('chartSection').style.display='';document.getElementById('tabChart').classList.add('active');renderCharts();}
  else if(tab==='todo'){document.getElementById('todoSection').style.display='';document.getElementById('tabTodo').classList.add('active');subscribeTodos();}
};

// ── 할일 관리 ──────────────────────────────────────
function subscribeTodos() {
  if(todoUnsub) return; // 이미 구독중
  var q = query(collection(db,'todos'), orderBy('createdAt','desc'));
  todoUnsub = onSnapshot(q, function(snap){
    todos = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    renderTodos();
  }, function(err){ console.error('todos error:', err); });
}

function filteredTodos() {
  if(todoFilter==='all') return todos;
  if(todoFilter==='pending') return todos.filter(function(t){return t.status==='pending';});
  if(todoFilter==='done') return todos.filter(function(t){return t.status==='done';});
  if(todoFilter==='p1') return todos.filter(function(t){return t.person===1;});
  if(todoFilter==='p2') return todos.filter(function(t){return t.person===2;});
  return todos;
}

function renderTodos() {
  var ft = filteredTodos();
  var list = document.getElementById('todoList');
  if(!ft.length){ list.innerHTML='<div class="empty">할일이 없어요 😊</div>'; return; }
  list.innerHTML = ft.map(function(t){
    var isDone = t.status==='done';
    var pClass = 'p'+t.person;
    var pEmoji = t.person===1?'🦡':'🦉';
    var pName = t.person===1?'오소리':'부엉이';
    var date = t.date||'';
    return '<div class="todo-item '+(isDone?'done-item':'')+'">'+
      '<button class="todo-check '+(isDone?'done':'pending')+'" onclick="toggleTodo(\''+t.id+'\',\''+t.status+'\')">'+
        (isDone?'✓':'')+'</button>'+
      '<div class="todo-info">'+
        '<div class="todo-content'+(isDone?' done-text':'')+'">'+esc(t.content)+'</div>'+
        '<div class="todo-meta">'+
          '<span class="badge '+pClass+'">'+pEmoji+' '+esc(pName)+'</span>'+
          '<span class="todo-status '+(isDone?'done':'pending')+'">'+(isDone?'완료':'처리중')+'</span>'+
          (date?'<span>'+date+'</span>':'')+
        '</div>'+
      '</div>'+
      '<button class="todo-del" onclick="delTodo(\''+t.id+'\')">×</button>'+
    '</div>';
  }).join('');
}

window.addTodo = async function() {
  var content = document.getElementById('todoContent').value.trim();
  if(!content){toast('내용을 입력해주세요');return;}
  try {
    var now = new Date();
    await addDoc(collection(db,'todos'),{
      content: content,
      status: 'pending',
      person: currentUser.person,
      addedBy: currentUser.id,
      date: now.toISOString().slice(0,10),
      createdAt: now.getTime()
    });
    document.getElementById('todoContent').value='';
    toast('할일 추가됨 ✅');
  } catch(e){ toast('저장 실패'); }
};

window.toggleTodo = async function(id, currentStatus) {
  var newStatus = currentStatus==='pending'?'done':'pending';
  try {
    await updateDoc(doc(db,'todos',id),{ status: newStatus });
    toast(newStatus==='done'?'완료! 🎉':'다시 처리중으로 변경됨');
  } catch(e){ toast('변경 실패'); }
};

window.delTodo = async function(id) {
  try { await deleteDoc(doc(db,'todos',id)); toast('삭제됨'); }
  catch(e){ toast('삭제 실패'); }
};

window.setTodoFilter = function(f, btn) {
  todoFilter = f;
  document.querySelectorAll('#todoSection .fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderTodos();
};
window.setFilter=function(f,btn){currentFilter=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderRecords();};

window.addExpense=async function(){
  var amt=parseNum(document.getElementById('expenseAmount').value);
  if(!amt){toast('금액을 입력해주세요');return;}
  var btn=document.getElementById('expenseSubmitBtn');
  btn.disabled=true; syncStatus('ing');
  try{
    var now=new Date();
    await addDoc(collection(db,'records'),{type:'expense',amount:amt,category:document.getElementById('expenseCategory').value,payment:document.getElementById('expensePayment').value,memo:document.getElementById('expenseMemo').value.trim(),person:currentUser.person,addedBy:currentUser.id,date:now.toISOString().slice(0,10),period:currentKey,createdAt:now.getTime()});
    document.getElementById('expenseAmount').value='';document.getElementById('expenseMemo').value='';
    toast('지출 추가됨 💸');
  }catch(e){toast('저장 실패');}
  btn.disabled=false;
};

window.addIncome=async function(){
  var amt=parseNum(document.getElementById('incomeAmount').value);
  if(!amt){toast('금액을 입력해주세요');return;}
  var btn=document.getElementById('incomeSubmitBtn');
  btn.disabled=true; syncStatus('ing');
  try{
    var now=new Date();
    await addDoc(collection(db,'records'),{type:'income',amount:amt,category:document.getElementById('incomeCategory').value,memo:document.getElementById('incomeMemo').value.trim(),person:currentUser.person,addedBy:currentUser.id,date:now.toISOString().slice(0,10),period:currentKey,createdAt:now.getTime()});
    document.getElementById('incomeAmount').value='';document.getElementById('incomeMemo').value='';
    toast('수입 추가됨 💰');
  }catch(e){toast('저장 실패');}
  btn.disabled=false;
};

window.delRecord=async function(id){try{await deleteDoc(doc(db,'records',id));toast('삭제됨');}catch(e){toast('삭제 실패');}};

function bindKeys(){
  document.getElementById('expenseAmount').addEventListener('keypress',function(e){if(e.key==='Enter')addExpense();});
  document.getElementById('expenseMemo').addEventListener('keypress',function(e){if(e.key==='Enter')addExpense();});
  document.getElementById('incomeAmount').addEventListener('keypress',function(e){if(e.key==='Enter')addIncome();});
  document.getElementById('incomeMemo').addEventListener('keypress',function(e){if(e.key==='Enter')addIncome();});
  document.getElementById('todoContent').addEventListener('keypress',function(e){if(e.key==='Enter')addTodo();});
}

function fmt(n){return Math.abs(Math.round(n)).toLocaleString('ko-KR');}
function parseNum(v){return parseInt(String(v).replace(/[^0-9]/g,''))||0;}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

init();
